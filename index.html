<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>設備盤點系統</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #22263a;
    --border: #2e3354;
    --accent: #4f9cf9;
    --accent2: #7c3aed;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --text: #e8eaf6;
    --muted: #7b82a8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', 'PingFang TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #22263a 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
  .header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

  /* ── Progress Bar ── */
  .progress-bar-wrap {
    height: 3px; background: var(--border);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
  }

  /* ── Steps ── */
  .step { display: none; padding: 20px; }
  .step.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 3px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* ── Inputs ── */
  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  /* ── Buttons ── */
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #2563eb);
    color: #fff;
  }
  .btn-success {
    background: linear-gradient(135deg, var(--success), #16a34a);
    color: #fff;
  }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-sm {
    width: auto;
    padding: 10px 18px;
    font-size: 14px;
    border-radius: 8px;
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* ── Device List ── */
  .device-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .device-item.scanned {
    border-color: var(--success);
    background: rgba(34,197,94,0.06);
  }
  .device-item.scanned::after {
    content: '✓ 已確認';
    position: absolute;
    top: 10px; right: 12px;
    font-size: 11px;
    color: var(--success);
    font-weight: 700;
  }
  .device-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .device-serial { font-size: 12px; color: var(--muted); font-family: monospace; }
  .device-model { font-size: 12px; color: var(--accent); margin-top: 2px; }

  /* ── Scanner ── */
  .scanner-wrap {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 4/3;
    margin-bottom: 16px;
  }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .scan-frame {
    width: 200px; height: 120px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
    position: relative;
  }
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanLine 2s linear infinite;
  }
  @keyframes scanLine {
    0% { top: 0; }
    100% { top: 100%; }
  }

  /* ── Camera Preview ── */
  .photo-preview {
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .photo-preview img { width: 100%; display: block; }
  .photo-placeholder {
    aspect-ratio: 4/3;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font-size: 14px;
  }
  .photo-placeholder .icon { font-size: 40px; }

  /* ── Match Result ── */
  .match-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .match-badge.found { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
  .match-badge.notfound { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }

  /* ── Info Row ── */
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--muted); flex-shrink: 0; width: 80px; }
  .info-value { font-weight: 600; text-align: right; word-break: break-all; }

  /* ── Stats ── */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 800; }
  .stat-num.green { color: var(--success); }
  .stat-num.blue  { color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 14px 22px;
    border-radius: 40px;
    font-size: 14px;
    font-weight: 600;
    z-index: 9999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { color: var(--success); border-color: rgba(34,197,94,0.4); }
  #toast.error   { color: var(--danger);  border-color: rgba(239,68,68,0.4); }

  /* ── Loading ── */
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .gap { height: 80px; }
  .section-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .section-sub { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
</style>
</head>
<body>

<!-- ======== HEADER ======== -->
<div class="header">
  <div class="header-icon">📦</div>
  <div>
    <h1>設備盤點系統</h1>
    <p id="headerSub">請登入開始盤點</p>
  </div>
</div>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
</div>

<!-- ======== STEP 1: LOGIN ======== -->
<div class="step active" id="step1">
  <br>
  <div style="text-align:center; padding: 20px 0 24px;">
    <div style="font-size:56px; margin-bottom:12px;">📦</div>
    <div class="section-title">設備盤點系統</div>
    <div class="section-sub">輸入姓名即可開始盤點</div>
  </div>

  <div class="card">
    <div class="card-title">您的姓名</div>
    <input type="text" id="nameInput" placeholder="例：朱展慶" autocomplete="off"
      style="font-size:20px; padding:16px; text-align:center; letter-spacing:2px;"
      onkeydown="if(event.key==='Enter') doLogin()">
  </div>

  <button class="btn btn-primary" onclick="doLogin()" style="font-size:18px; padding:18px;">
    🔍 查詢我的設備清單
  </button>
  <div class="gap"></div>
</div>

<!-- ======== STEP 2: DEVICE LIST ======== -->
<div class="step" id="step2">
  <br>
  <div class="section-title" id="step2Title">設備清單</div>
  <div class="section-sub" id="step2Sub">點選設備後掃描條碼確認</div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num blue" id="statTotal">0</div>
      <div class="stat-label">總設備數</div>
    </div>
    <div class="stat-box">
      <div class="stat-num green" id="statDone">0</div>
      <div class="stat-label">已確認</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">待盤點設備</div>
    <div id="deviceList">
      <div class="loading">
        <div class="spinner"></div><br>載入中...
      </div>
    </div>
  </div>

  <button class="btn btn-success" id="finishBtn" onclick="goStep(4)" disabled>
    ✅ 完成盤點，送出報告
  </button>
  <div class="gap"></div>
</div>

<!-- ======== STEP 3: SCAN + PHOTO ======== -->
<div class="step" id="step3">
  <br>
  <div class="section-title">📷 掃描確認</div>
  <div class="section-sub" id="scanDeviceName">請對準設備條碼</div>

  <!-- Scanner -->
  <div class="card">
    <div class="card-title">條碼掃描</div>
    <div class="scanner-wrap">
      <video id="video" playsinline autoplay muted></video>
      <div class="scan-overlay">
        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
    <div id="scanResult" style="display:none">
      <div id="matchBadge"></div>
      <div id="matchInfo"></div>
    </div>
  </div>

  <!-- Photo -->
  <div class="card" id="photoSection" style="display:none">
    <div class="card-title">拍攝設備照片（主管審核用）</div>
    <div class="photo-preview" id="photoPreview">
      <div class="photo-placeholder">
        <div class="icon">📷</div>
        <span>尚未拍照</span>
      </div>
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="onPhotoSelected(this)">
    <button class="btn btn-outline" onclick="document.getElementById('photoInput').click()">
      📷 拍攝設備照片
    </button>
  </div>

  <div id="confirmSection" style="display:none">
    <button class="btn btn-success" id="confirmBtn" onclick="confirmDevice()" disabled>
      ✅ 確認此設備在身上
    </button>
  </div>
  <br>
  <button class="btn btn-outline" onclick="manualScan()" style="margin-bottom:10px;">
    ⌨️ 手動輸入序號
  </button>
  <button class="btn btn-outline" onclick="goStep(2); stopCamera()">
    ← 返回清單
  </button>
  <div class="gap"></div>
</div>

<!-- ======== STEP 4: SUMMARY ======== -->
<div class="step" id="step4">
  <br>
  <div class="section-title">📊 盤點結果</div>
  <div class="section-sub" id="summaryName"></div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num green" id="sumDone">0</div>
      <div class="stat-label">已確認</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="sumMissing" style="color:var(--warning)">0</div>
      <div class="stat-label">未盤點</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">未盤點設備</div>
    <div id="missingList"></div>
  </div>

  <button class="btn btn-primary" id="submitBtn" onclick="submitInventory()">
    📤 送出盤點結果
  </button>
  <div class="gap"></div>
</div>

<!-- ======== STEP 5: DONE ======== -->
<div class="step" id="step5">
  <br>
  <div style="text-align:center; padding: 40px 20px;">
    <div style="font-size:72px; margin-bottom:16px;">✅</div>
    <div class="section-title">盤點完成！</div>
    <br>
    <div class="card" style="text-align:left">
      <div id="finalSummary"></div>
    </div>
    <br>
    <p style="font-size:13px;color:var(--muted)">資料已記錄，主管將收到審核通知</p>
  </div>
</div>

<!-- ======== TOAST ======== -->
<div id="toast"></div>

<script>
// ============================================================
//  CONFIG — 固定設定（管理員填入，員工不需要設定）
// ============================================================
let CONFIG = {
  scriptUrl: 'https://script.google.com/macros/s/AKfycbxezxGp4PRtbMfAp4FSAJjW2xJcS48LzHw7MPSEelygTGwYsLBn56Bg_P3VQ1iZX4-i/exec',  // ← 部署後填入
  sheetId:   '13XJ-LmMOoyMQiNhwbhlwR2GBS1MtNWJeM6A-IOmHEzM',              // ← 試算表ID填入
};

// ============================================================
//  STATE
// ============================================================
let state = {
  employeeName: '',
  devices: [],          // [{serial, name, model, row}]
  scannedItems: [],     // [{serial, name, photoBase64, time}]
  currentDevice: null,
  photoBase64: null,
  scanActive: false,
  stream: null,
};

// ============================================================
//  STEP NAVIGATION
// ============================================================
function goStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
  const pct = [0, 25, 50, 75, 100, 100];
  document.getElementById('progressBar').style.width = pct[n] + '%';
}

// ============================================================
//  STEP 1 — LOGIN
// ============================================================
async function doLogin() {
  const name = document.getElementById('nameInput').value.trim();

  if (!name) return showToast('請輸入您的姓名', 'error');

  state.employeeName = name;
  document.getElementById('headerSub').textContent = '員工：' + name;
  goStep(2);
  await loadDevices(name);
}

async function loadDevices(name) {
  document.getElementById('deviceList').innerHTML = `
    <div class="loading"><div class="spinner"></div><br>載入設備清單中...</div>`;
  try {
    const url = `${CONFIG.scriptUrl}?action=getDevices&name=${encodeURIComponent(name)}`;
    const res = await fetch(url);
    const data = await res.json();

    if (!data.success) throw new Error(data.message || '查詢失敗');

    state.devices = data.devices;
    renderDeviceList();
  } catch (e) {
    document.getElementById('deviceList').innerHTML = `
      <div style="color:var(--danger);font-size:14px;text-align:center;padding:20px;">
        ⚠️ 無法連線：${e.message}<br><br>
        <small style="color:var(--muted)">請確認 Apps Script 網址正確且已部署</small>
      </div>`;
  }
}

function renderDeviceList() {
  const list = document.getElementById('deviceList');
  const total = state.devices.length;
  const done = state.scannedItems.length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('step2Title').textContent = state.employeeName + ' 的設備';
  document.getElementById('step2Sub').textContent = `共 ${total} 件，已確認 ${done} 件`;
  document.getElementById('finishBtn').disabled = (done === 0);

  if (total === 0) {
    list.innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted);font-size:14px;">查無此員工名下設備</div>`;
    return;
  }

  list.innerHTML = state.devices.map((d, i) => {
    const isScanned = state.scannedItems.some(s => s.serial === d.serial);
    return `
      <div class="device-item ${isScanned ? 'scanned' : ''}" onclick="${isScanned ? '' : 'startScan(' + i + ')'}">
        <div class="device-name">${d.name}</div>
        <div class="device-serial">序號：${d.serial}</div>
        ${d.model ? `<div class="device-model">${d.model}</div>` : ''}
      </div>`;
  }).join('');
}

// ============================================================
//  STEP 3 — SCAN
// ============================================================
function startScan(idx) {
  state.currentDevice = state.devices[idx];
  state.photoBase64 = null;

  document.getElementById('scanDeviceName').textContent =
    '掃描：' + state.currentDevice.name;
  document.getElementById('scanResult').style.display = 'none';
  document.getElementById('photoSection').style.display = 'none';
  document.getElementById('confirmSection').style.display = 'none';
  document.getElementById('photoPreview').innerHTML = `
    <div class="photo-placeholder"><div class="icon">📷</div><span>尚未拍照</span></div>`;

  goStep(3);
  startCamera();
}

async function startCamera() {
  stopCamera();
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = state.stream;
    video.onloadedmetadata = () => {
      state.scanActive = true;
      scanLoop();
    };
  } catch (e) {
    showToast('無法開啟相機：' + e.message, 'error');
  }
}

function stopCamera() {
  state.scanActive = false;
  if (state.stream) {
    state.stream.getTracks().forEach(t => t.stop());
    state.stream = null;
  }
}

// ── 條碼掃描：優先用原生 BarcodeDetector，備用 ZXing ──
async function scanLoop() {
  if (!state.scanActive) return;

  const video = document.getElementById('video');
  if (!video || video.readyState < 2) {
    setTimeout(scanLoop, 200);
    return;
  }

  // 方法一：Chrome Android 原生 BarcodeDetector（最快最準）
  if ('BarcodeDetector' in window) {
    try {
      if (!state.barcodeDetector) {
        state.barcodeDetector = new BarcodeDetector({
          formats: ['code_128', 'code_39', 'ean_13', 'ean_8', 'qr_code', 'data_matrix', 'upc_a', 'upc_e']
        });
      }
      const codes = await state.barcodeDetector.detect(video);
      if (codes.length > 0) {
        onBarcodeScan(codes[0].rawValue);
        return;
      }
    } catch(e) {}
    if (state.scanActive) setTimeout(scanLoop, 150);
    return;
  }

  // 方法二：ZXing（備用）
  if (!window.ZXingReader) {
    await loadZXing();
  }

  if (window.ZXingReader) {
    try {
      const result = await window.ZXingReader.decodeFromVideoElement(video).catch(() => null);
      if (result) {
        onBarcodeScan(result.text);
        return;
      }
    } catch(e) {}
  }

  if (state.scanActive) setTimeout(scanLoop, 200);
}

async function loadZXing() {
  return new Promise((resolve) => {
    if (window.ZXingReader) { resolve(); return; }
    const script = document.createElement('script');
    // 使用 unpkg 作為備用 CDN
    script.src = 'https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
    script.onload = () => {
      try {
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
        const reader = new ZXing.BrowserMultiFormatReader(hints);
        window.ZXingReader = reader;
      } catch(e) {
        window.ZXingReader = null;
      }
      resolve();
    };
    script.onerror = () => { window.ZXingReader = null; resolve(); };
    document.head.appendChild(script);
  });
}

function onBarcodeScan(code) {
  state.scanActive = false;
  stopCamera();

  const device = state.currentDevice;
  const found = (code.trim().toUpperCase() === device.serial.trim().toUpperCase());

  const resultDiv = document.getElementById('scanResult');
  resultDiv.style.display = 'block';

  document.getElementById('matchBadge').innerHTML = found
    ? `<div class="match-badge found">✅ 條碼符合</div>`
    : `<div class="match-badge notfound">⚠️ 條碼不符合（掃到：${code}）</div>`;

  document.getElementById('matchInfo').innerHTML = `
    <div class="info-row"><span class="info-label">品名</span><span class="info-value">${device.name}</span></div>
    <div class="info-row"><span class="info-label">序號</span><span class="info-value">${device.serial}</span></div>
    <div class="info-row"><span class="info-label">掃描值</span><span class="info-value">${code}</span></div>
  `;

  document.getElementById('photoSection').style.display = 'block';
  document.getElementById('confirmSection').style.display = 'block';
  document.getElementById('confirmBtn').disabled = true; // 要拍照後才能確認
}

// ── Manual scan fallback (type serial) ──
function manualScan() {
  const code = prompt('手動輸入序號：');
  if (code) onBarcodeScan(code.trim());
}

// ============================================================
//  PHOTO
// ============================================================
function onPhotoSelected(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    state.photoBase64 = e.target.result.split(',')[1];
    document.getElementById('photoPreview').innerHTML =
      `<img src="${e.target.result}" alt="設備照片">`;
    document.getElementById('confirmBtn').disabled = false;
    showToast('照片已選取 ✓', 'success');
  };
  reader.readAsDataURL(file);
}

// ============================================================
//  CONFIRM DEVICE
// ============================================================
function confirmDevice() {
  if (!state.photoBase64) return showToast('請先拍照', 'error');

  const device = state.currentDevice;
  state.scannedItems.push({
    serial:      device.serial,
    name:        device.name,
    photoBase64: state.photoBase64,
    time:        new Date().toLocaleString('zh-TW'),
    row:         device.row,
  });

  stopCamera();
  showToast('✅ 已確認：' + device.name, 'success');
  renderDeviceList();
  goStep(2);
}

// ============================================================
//  STEP 4 — SUMMARY
// ============================================================
function showSummary() {
  const total   = state.devices.length;
  const done    = state.scannedItems.length;
  const missing = state.devices.filter(d =>
    !state.scannedItems.some(s => s.serial === d.serial));

  document.getElementById('summaryName').textContent =
    state.employeeName + '・' + new Date().toLocaleDateString('zh-TW') + ' 盤點';
  document.getElementById('sumDone').textContent = done;
  document.getElementById('sumMissing').textContent = missing.length;

  const ml = document.getElementById('missingList');
  if (missing.length === 0) {
    ml.innerHTML = `<div style="text-align:center;color:var(--success);padding:16px;font-weight:700;">🎉 全部設備均已確認！</div>`;
  } else {
    ml.innerHTML = missing.map(d => `
      <div class="device-item">
        <div class="device-name">${d.name}</div>
        <div class="device-serial">序號：${d.serial}</div>
      </div>`).join('');
  }
}

// ============================================================
//  SUBMIT
// ============================================================
async function submitInventory() {
  showSummary(); // refresh counts first
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0"></div> 上傳中...';

  try {
    const payload = {
      action: 'submitInventory',
      employeeName: state.employeeName,
      scannedItems: state.scannedItems,
      allDevices:   state.devices.map(d => d.serial),
      submitTime:   new Date().toISOString(),
    };

    // 用 GET 送出（避免 CORS 問題），照片 base64 太大要分批
    // 先不帶照片送出基本資料，照片改用 GET 參數
    const payloadNoPhoto = {
      ...payload,
      scannedItems: payload.scannedItems.map(item => ({
        serial: item.serial,
        name: item.name,
        time: item.time,
        row: item.row,
        photoBase64: item.photoBase64 || '',
      }))
    };
    const encoded = encodeURIComponent(JSON.stringify(payloadNoPhoto));
    const url = `${CONFIG.scriptUrl}?action=submitInventory&data=${encoded}`;
    const res = await fetch(url);
    const data = await res.json();

    if (!data.success) throw new Error(data.message);

    document.getElementById('finalSummary').innerHTML = `
      <div class="info-row"><span class="info-label">員工</span><span class="info-value">${state.employeeName}</span></div>
      <div class="info-row"><span class="info-label">時間</span><span class="info-value">${new Date().toLocaleString('zh-TW')}</span></div>
      <div class="info-row"><span class="info-label">已確認</span><span class="info-value" style="color:var(--success)">${state.scannedItems.length} 件</span></div>
      <div class="info-row"><span class="info-label">照片連結</span><span class="info-value"><a href="${data.folderUrl||'#'}" target="_blank" style="color:var(--accent)">查看 Drive 資料夾</a></span></div>
    `;
    goStep(5);
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = '📤 送出盤點結果';
    showToast('送出失敗：' + e.message, 'error');
  }
}

// ============================================================
//  UTILS
// ============================================================
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 2500);
}

// Override goStep(4) to show summary
const _goStep = goStep;
window.goStep = function(n) {
  if (n === 4) showSummary();
  _goStep(n);
};
</script>
